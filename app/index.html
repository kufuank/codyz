<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codyz · Giriş — Yol panele</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#15110E;--bg:#0E0B09;--surface:#181410;--surface-2:#211B16;
  --line:rgba(246,242,233,.10);--line-2:rgba(246,242,233,.16);
  --coral:#FF6A3D;--violet:#7C6BFF;--gold:#F2A93B;--cream:#F6F2E9;
  --tx:#F4EFE6;--tx-2:rgba(244,239,230,.66);--tx-3:rgba(244,239,230,.40);
  --ok:#5FBF8E;--err:#FF6A3D;--r:16px;--ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
body{margin:0;min-height:100dvh;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);
  display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(900px 600px at 80% -10%,rgba(124,107,255,.14),transparent 60%),radial-gradient(700px 500px at -10% 110%,rgba(255,106,61,.10),transparent 55%);}
h1,h2,.dsp{font-family:'Sora',sans-serif;margin:0;letter-spacing:-.02em}
a{color:var(--coral)}
.wrap{width:100%;max-width:880px;display:grid;grid-template-columns:1.05fr .95fr;border:1px solid var(--line);
  border-radius:24px;overflow:hidden;background:var(--surface);box-shadow:0 40px 120px -50px rgba(0,0,0,.8)}

/* sol görsel panel */
.aside{position:relative;background:var(--ink);padding:34px;display:flex;flex-direction:column;justify-content:space-between;min-height:520px;overflow:hidden}
.aside img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5}
.aside__scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,11,9,.55),rgba(14,11,9,.9))}
.aside__in{position:relative;z-index:2}
.mark{font-family:'Sora';font-weight:800;font-size:1.6rem;letter-spacing:-.03em}
.mark .z{color:var(--coral)}
.aside h2{font-size:1.9rem;font-weight:800;line-height:1.08;margin-top:auto;position:relative;z-index:2}
.aside h2 em{font-style:normal;color:var(--gold)}
.aside p{position:relative;z-index:2;color:var(--tx-2);margin-top:12px;font-size:.92rem;max-width:32ch}
.belt-dots{display:flex;gap:7px;position:relative;z-index:2;margin-top:20px}
.belt-dots i{width:9px;height:9px;border-radius:50%;background:rgba(246,242,233,.22)}
.belt-dots i.now{background:var(--gold)}.belt-dots i.done{background:var(--coral)}

/* form */
.form{padding:clamp(26px,4vw,40px);display:flex;flex-direction:column}
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:4px;margin-bottom:24px}
.tabs button{flex:1;border:none;background:none;color:var(--tx-2);font-family:'Sora';font-weight:600;font-size:.9rem;
  padding:9px;border-radius:99px;cursor:pointer;transition:background .2s,color .2s}
.tabs button.active{background:var(--surface-2);color:var(--tx)}
.form h1{font-size:1.5rem;font-weight:700}
.form .sub{color:var(--tx-3);font-size:.88rem;margin:6px 0 22px}
.field{margin-bottom:15px}
.field label{display:block;font-family:'Sora';font-weight:600;font-size:.78rem;color:var(--tx-2);margin-bottom:7px}
.field input{width:100%;background:var(--bg);border:1px solid var(--line-2);border-radius:12px;
  padding:12px 14px;color:var(--tx);font-size:.94rem;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(124,107,255,.18)}
.field input::placeholder{color:var(--tx-3)}
.track{display:none;gap:10px;margin-bottom:15px}
.track.show{display:flex}
.track label{flex:1;cursor:pointer;position:relative}
.track input{position:absolute;opacity:0;pointer-events:none}
.track .opt{display:block;height:100%;border:1px solid var(--line-2);border-radius:12px;padding:12px;text-align:center;transition:border-color .2s,background .2s}
.track .opt b{font-family:'Sora';font-weight:600;font-size:.9rem;display:block}
.track .opt small{color:var(--tx-3);font-size:.74rem}
.track input:checked + .opt{border-color:var(--coral);background:rgba(255,106,61,.08)}
.track label:last-child input:checked + .opt{border-color:var(--gold);background:rgba(242,169,59,.08)}
.btn{margin-top:8px;width:100%;border:none;cursor:pointer;font-family:'Sora';font-weight:700;font-size:.96rem;
  background:var(--coral);color:var(--ink);padding:13px;border-radius:12px;transition:transform .15s var(--ease),opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:wait;transform:none}
.spin{width:16px;height:16px;border:2px solid rgba(21,17,14,.4);border-top-color:var(--ink);border-radius:50%;animation:s .7s linear infinite;display:none}
.btn.loading .spin{display:block}.btn.loading .lbl{opacity:.7}
@keyframes s{to{transform:rotate(360deg)}}
.msg{margin-top:16px;padding:11px 14px;border-radius:12px;font-size:.85rem;display:none;line-height:1.4}
.msg.show{display:block}
.msg.err{background:rgba(255,106,61,.12);border:1px solid rgba(255,106,61,.4);color:#ffb69e}
.msg.ok{background:rgba(95,191,142,.12);border:1px solid rgba(95,191,142,.4);color:#a6e0c4}
.foot{margin-top:22px;color:var(--tx-3);font-size:.82rem;text-align:center}
:focus-visible{outline:2.5px solid var(--violet);outline-offset:2px}

/* Responsive — temel kurallardan SONRA gelmeli ki ezebilsin */
@media(max-width:740px){
  .wrap{grid-template-columns:1fr;max-width:440px}
  .aside{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <aside class="aside">
    <img src="../assets/hero-ink.webp" alt="" aria-hidden="true" />
    <div class="aside__scrim"></div>
    <div class="aside__in">
      <div class="mark">Cody<span class="z">z</span></div>
      <div style="color:var(--tx-3);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;font-family:Sora;font-weight:600;margin-top:4px">Yol · panel</div>
    </div>
    <div>
      <h2>Su gibi ol.<br><em>İlk kuşağını</em> kuşan.</h2>
      <p>Hesabını oluştur, beyaz kuşaktan başla. İlk idmanların ve şaheserin seni bekliyor.</p>
      <div class="belt-dots"><i class="now"></i><i></i><i></i><i></i></div>
    </div>
  </aside>

  <main class="form">
    <div class="tabs" role="tablist">
      <button id="tabLogin" class="active" role="tab">Giriş</button>
      <button id="tabSignup" role="tab">Kayıt ol</button>
    </div>

    <h1 id="title">Tekrar hoş geldin</h1>
    <p class="sub" id="subtitle">İdmanların kaldığın yerden devam ediyor.</p>

    <form id="authForm" novalidate>
      <div class="field" id="nameField" style="display:none">
        <label for="name">Ad</label>
        <input id="name" type="text" autocomplete="name" placeholder="Adın" />
      </div>

      <div class="track" id="trackField">
        <label><input type="radio" name="track" value="cocuk" checked /><span class="opt"><b>Çocuk yolu</b><small>8–17 yaş</small></span></label>
        <label><input type="radio" name="track" value="usta" /><span class="opt"><b>Usta yolu</b><small>girişimci & ebeveyn</small></span></label>
      </div>

      <div class="field">
        <label for="email">E-posta</label>
        <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="ornek@codyz.club" required />
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="En az 6 karakter" minlength="6" required />
      </div>

      <button class="btn" id="submitBtn" type="submit"><span class="spin"></span><span class="lbl">Giriş yap</span></button>
      <div class="msg" id="msg" role="alert" aria-live="polite"></div>
    </form>

    <p class="foot">Devam ederek Codyz Club topluluk kurallarını kabul edersin.</p>
  </main>
</div>

<script type="module">
import { supabase } from './config.js';

const $ = (id) => document.getElementById(id);
let mode = 'login';

// Zaten girişliyse panele
(async () => {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) location.replace('./panel.html');
})();

function setMode(m){
  mode = m;
  const signup = m === 'signup';
  $('tabLogin').classList.toggle('active', !signup);
  $('tabSignup').classList.toggle('active', signup);
  $('title').textContent = signup ? 'Yola çık' : 'Tekrar hoş geldin';
  $('subtitle').textContent = signup ? 'Hesabını oluştur, beyaz kuşağını kuşan.' : 'İdmanların kaldığın yerden devam ediyor.';
  $('nameField').style.display = signup ? 'block' : 'none';
  $('trackField').classList.toggle('show', signup);
  $('password').autocomplete = signup ? 'new-password' : 'current-password';
  $('submitBtn').querySelector('.lbl').textContent = signup ? 'Hesabımı oluştur' : 'Giriş yap';
  hideMsg();
}
$('tabLogin').onclick = () => setMode('login');
$('tabSignup').onclick = () => setMode('signup');

function showMsg(text, type){ const m=$('msg'); m.textContent=text; m.className='msg show '+type; }
function hideMsg(){ $('msg').className='msg'; }
function loading(on){ const b=$('submitBtn'); b.disabled=on; b.classList.toggle('loading',on); }

$('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMsg();
  const email = $('email').value.trim();
  const password = $('password').value;
  if (!email || password.length < 6){ showMsg('E-posta ve en az 6 karakterlik şifre gerekli.', 'err'); return; }
  loading(true);

  try{
    if (mode === 'signup'){
      const full_name = $('name').value.trim() || email.split('@')[0];
      const track = document.querySelector('input[name="track"]:checked').value;
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name, track } }
      });
      if (error) throw error;
      if (data.session){
        location.replace('./panel.html');           // e-posta onayı kapalıysa direkt panele
      } else {
        showMsg('Hesabın oluşturuldu. Girişi tamamlamak için e-postandaki onay bağlantısına tıkla, sonra giriş yap.', 'ok');
        setTimeout(()=>setMode('login'), 400);
      }
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      location.replace('./panel.html');
    }
  } catch(err){
    const map = {
      'Invalid login credentials':'E-posta ya da şifre hatalı.',
      'User already registered':'Bu e-posta zaten kayıtlı. Giriş yapmayı dene.',
      'Email not confirmed':'E-postan henüz onaylanmadı. Gelen kutunu kontrol et.'
    };
    showMsg(map[err.message] || ('Bir şey ters gitti: '+err.message), 'err');
    loading(false);
  }
});
</script>
</body>
</html>
